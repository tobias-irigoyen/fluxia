<div class="flex flex-col justify-center items-center justify-center max-[992px]:max-w-[100%] px-[20px] max-w-[1280px] w-full mx-auto min-h-[calc(100vh-64px)] pb-12">
    <app-section-heading
        subheading="The problem"
        title="Why most businesses are stuck on manual"
        lead="Legacy processes and disconnected tools create friction that costs you time, money, and growth. Sound familiar?">
    </app-section-heading>
    <div class="grid grid-cols-3 gap-4 max-[992px]:grid-cols-2 max-[768px]:grid-cols-1">
        <article *ngFor="let problem of problems" class="flex flex-col items-start bg-white p-8 rounded-md hover:translate-y-[-5px] hover:shadow-[2px_2px_5px_rgba(0,0,0,0.1)] transition-all duration-300 border border-[#ececec]">
            <div class="bg-[#fef2f2] w-8 h-8 flex items-center justify-center rounded-md mb-4 max-[992px]:w-12 max-[992px]:h-12">
                <i-lucide [name]="problem.icon" class="w-4 h-4 text-[#ff6467] max-[992px]:w-6 max-[992px]:h-6"></i-lucide>
            </div>
            <header>
                <h3 class="font-semibold text-gray-900 mb-3">{{ problem.title }}</h3>
            </header>
            <p class="text-gray-500 text-[.9rem]">{{ problem.description }}</p>
        </article>
    </div>

</div>
