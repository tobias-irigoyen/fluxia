    <div class="flex flex-col justify-center items-center justify-center h-[calc(100vh-64px)]"  >

        <div class="flex flex-col w-[50%] max-[992px]:w-[100%] max-[992px]:items-center max-[992px]:justify-center max-[992px]:mx-auto">
          <div>
            <div class="bg-[#f2f8ff] border border-[#c5deff] px-3 py-1 mb-4 border border-[#dbeafe] rounded-full max-w-max">
              <span class="text-[#123ec7] mr-1">●</span>
              <span class="uppercase text-[#123ec7] text-[.8rem] font-semibold ">AI-Powered Business Automation</span>
            </div>
          </div>
          <div>
              <h2 class="text-gray-900 font-bold text-[3.75rem] max-[992px]:text-[2.5rem] leading-[1.1] mb-6  max-[992px]:mb-2">Automate the future. <span class="text-[#2563eb]">Power your</span> business with AI.</h2>
              <p class="text-gray-500 text-[1.125rem] mb-10 leading-[1.5] max-[992px]:mb-6 max-[992px]:text-[1rem]">Fluxia replaces repetitive workflows with intelligent automation — so your team can focus on what truly matters. Deploy AI agents in minutes, not months.</p>
              <div class="flex justify-start gap-4 mb-8 max-[992px]:justify-center max-[465px]:flex-col max-[465px]:justify-center max-[465px]:items-center">
                  <button (click)="scrollTo('contact')" class="flex justify-center items-center gap-2 bg-[#2563eb] px-7 py-3 max-w-max font-semibold text-white cursor-pointer rounded-2xl hover:bg-[#1447e6] transition-all duration-300 min-w-[215px]">
                      <span>Start for Free</span>
                        <i-lucide [name]="MoveRight" class="w-[15px] h-[15px] text-[#fff]"></i-lucide>

                  <button (click)="scrollTo('how-it-works')" class="flex justify-center items-center gap-2 bg-white border border-[#e5e7eb] px-7 py-3 max-w-max font-semibold text-gray-900 cursor-pointer rounded-2xl hover:border-[#2563eb] transition-all duration-300 min-w-[215px]">
                    <i-lucide [name]="Play" class="w-[15px] h-[15px] text-[#2563eb]"></i-lucide>
                      <span>See how it works</span>
                  </button>
              </div>
              <div class="flex justify-start items-center gap-6 mb-4 max-[992px]:justify-center">
                <span class="flex justify-start items-center gap-2 text-[#6a7282] text-[.85rem] max-[992px]:text-xs" *ngFor="let quality of qualities">

                  {{ quality }}
                </span>
              </div>
          </div>
