<div
  class="w-full flex flex-col justify-center items-center justify-center max-[992px]:max-w-[100%] px-[20px] max-w-[1280px] w-full mx-auto min-h-[calc(100vh-64px)] pb-16"
>
  <app-section-heading
    subheading="How It Works"
    title="From setup to scale — in four steps"
    lead="Fluxia is built to get you running fast. Most teams are automating their first workflow within a day."
  >
  </app-section-heading>
  <div class="grid grid-cols-4 grid-rows-1 gap-8 mb-20 max-[992px]:grid-cols-2 max-[768px]:grid-cols-1">
    <app-how-it-works-card
      *ngFor="let card of cards"
      [title]="card.title"
      [lead]="card.lead"
      [stepIndicator]="card.stepIndicator"
      [icon]="card.icon"
      [iconBackground]="card.iconBackground"
      [iconColor]="card.iconColor"
    >
    </app-how-it-works-card>
  </div>
  <app-cta
    class="w-full"
    [flexDirection]="'flex-row'"
    [alignItems]="''"
    [gap]="''"
    [flexDirection]="'flex-row'"
    [title]="'Ready to automate your first workflow?'"
    [titleColor]="'text-white'"
    [lead]="'Setup takes less than 10 minutes. No credit card required.'"
    [leadColor]="'text-[rgba(255,255,255,.85)]'"
    [ctaBackgroundColor]="'bg-gradient-to-r from-blue-600 to-violet-600'"
    [btnContent]="'Get Started'"
    [btnBackgroundColor]="'bg-white'"
    [btnHoverBackgroundColor]="'hover:bg-[#c7c7c7]'"
    [btnColor]="'text-[#155dfc]'"
    [btnRightIcon]="MoveRight"
    [btnRightIconColor]="'#155dfc'"
    [btnFunctionName]="scrollToSection"
  >
  </app-cta>
</div>
