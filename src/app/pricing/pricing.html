<div
  class="w-full flex flex-col justify-center items-center justify-center max-[992px]:max-w-[100%] px-[20px] max-w-[1280px] w-full mx-auto min-h-[calc(100vh-64px)] pb-16"
>
  <app-section-heading
    subheading="Pricing"
    title="Simple, transparent pricing"
    lead="All plans include a 14-day free trial. No credit card required to start."
  >
  </app-section-heading>
  <div class="grid grid-cols-3 gap-6 max-[768px]:grid-cols-1 max-[768px]:gap-10">
    <app-pricing-card *ngFor="let feature of features" 
      [tagName]="feature.tagName"
      [tagColor]="feature.tagColor"
      [tagBackgroundColor]="feature.tagBackgroundColor"
      [isMostPopular]="feature.isMostPopular"
      [title]="feature.title"
      [textColor]="feature.textColor"
      [lead]="feature.lead"
      [price]="feature.price"
      [pricePeriod]="feature.pricePeriod"
      [featuresList]="feature.featuresList"
      [featureIcon]="feature.featureIcon"
      [btnContent]="feature.btnContent"
      [btnBackgroundColor]="feature.btnBackgroundColor"
      [btnHoverBackgroundColor]="feature.btnHoverBackgroundColor"
      [btnColor]="feature.btnColor"
      [btnFunctionName]="feature.btnFunctionName"
      [functionParams]="feature.functionParams"
      [isSmallPrice]="feature.isSmallPrice"
    >
    </app-pricing-card>
  </div>
</div>
