<div
  class="w-full flex flex-col justify-center items-center justify-center max-[992px]:max-w-[100%] px-[20px] max-w-[1280px] w-full mx-auto min-h-[calc(100vh-64px)] pb-16"
>
  <app-section-heading
    class="mb-8 max-[992px]:mb-4"
    subheading="Contact Us"
    title="Let's talk about your automation needs"
    lead="Whether you're ready to start or just exploring, our team is here to help you find the right solution."
  >
  </app-section-heading>

  <div
    class="flex justify-between w-full gap-12 max-[992px]:flex-col-reverse max-[992px]:translate-y-[-20px]"
  >
    <div class="flex flex-col gap-10">
      <div>
        <article
          class="flex flex-row-reverse items-center justify-start max-w-max mb-6"
          *ngFor="let info of asideInfo"
        >
          <header>
            <h3
              class="uppercase text-gray-500 mb-0.5 font-semibold text-[.8rem] tracking-[0.06] max-[992px]:text-[.9rem]"
            >
              {{ info.asideTitle }}
            </h3>
            <span class="text-gray-800 mb-0.5 text-[.9rem] font-semibold max-[992px]:text-[1rem]">{{
              info.asideInfo
            }}</span>
          </header>
          <div class="mr-6">
            <i-lucide
              [color]="info.iconColor"
              [img]="info.icon"
              class="w-[18px] h-[18px] max-[992px]:h-6 max-[992px]:w-6"
            ></i-lucide>
          </div>
        </article>
      </div>
      <div>
        <app-cta
          class="contact-cta"
          [flexDirection]="'flex-col'"
          [alignItems]="'items-start'"
          [gap]="'gap-6'"
          [title]="'Book a live demo'"
          [titleColor]="'text-white'"
          [lead]="'See Fluxia in action with a personalized walkthrough tailored to your industry and use case.'"
          [leadColor]="'text-white'"
          [ctaBackgroundColor]="'bg-[#155dfc]'"
          [btnContent]="'Schedule a Demo'"
          [btnBackgroundColor]="'bg-white'"
          [btnHoverBackgroundColor]="'hover:bg-[#c7c7c7]'"
          [btnColor]="'text-[#155dfc]'"
          [btnRightIcon]="MoveRight"
          [btnRightIconColor]="'#155dfc'"
        >
        </app-cta>
      </div>
    </div>

    <div>
      <form [formGroup]="contactForm" novalidate>
        <div class="flex justify-between gap-4">
          <div class="flex flex-col items-start max-[992px]:w-[50%]">
            <label
              for="full-name"
              class="font-semibold text-[.875rem] mb-2 text-gray-700 max-[992px]:text-[1rem]"
              >Full Name <span class="text-gray-500">(Required)</span></label
            >
            <input
              id="full-name"
              name="full-name"
              formControlName="fullName"
              required
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 max-[768px]:text-[.9rem]"
              type="text"
              placeholder="Enter your name..."
            />
          </div>
          <div class="flex flex-col items-start mb-8 max-[992px]:w-[50%]">
            <label
              for="work-email"
              class="font-semibold text-[.875rem] mb-2 text-gray-700 max-[992px]:text-[1rem]"
              >Work Email <span class="text-gray-500">(Required)</span></label
            >
            <input
              id="work-email"
              name="work-email"
              required
              formControlName="workEmail"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 max-[768px]:text-[.9rem]"
              type="text"
              placeholder="Enter your email..."
            />
          </div>
        </div>

        <div class="flex flex-col items-start mb-8">
          <label
            for="company"
            class="font-semibold text-[.875rem] mb-2 text-gray-700 max-[992px]:text-[1rem]"
            >Company</label
          >
          <input
            id="company"
            name="company"
            formControlName="company"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 max-[768px]:text-[.9rem]"
            type="email"
            placeholder="Enter your company name..."
          />
        </div>

        <div class="flex flex-col items-start mb-8">
          <label
            for="message"
            class="font-semibold text-[.875rem] mb-2 text-gray-700 max-[992px]:text-[1rem]"
            >How can we help? <span class="text-gray-500">(Required)</span></label
          >
          <textarea
            id="message"
            name="message"
            required
            formControlName="message"
            rows="6"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-gray-50 max-[768px]:text-[.9rem]"
            placeholder="Tell us about your automation challenges and what you'd like to achieve with Fluxia..."
          ></textarea>
        </div>

        <button
          (click)="onSubmit()"
          class="flex justify-center items-center gap-2 w-full text-white bg-[#155dfc] hover:bg-[#1447e6] rounded-xl py-3 cursor-pointer w-full text-center text-[.9rem] font-semibold transition-all duration-300"
        >
          Send Message <i-lucide [img]="Send" class="w-6 h-6"></i-lucide>
        </button>
      </form>
    </div>
  </div>
</div>
